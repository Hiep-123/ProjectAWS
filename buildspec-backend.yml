version: 0.2

# buildspec-backend.yml — Phase 9 CI/CD
#
# Deployment stage — runs AFTER manual approval.
# Deploys backend infrastructure stacks only.
# FrontendStack is deployed separately by buildspec-frontend.yml.
#
# Stack deployment order (respects CDK dependency graph):
#   1. AuthStack        — Cognito (already deployed, idempotent)
#   2. DatabaseStack    — DynamoDB (already deployed, idempotent)
#   3. EventStack       — EventBridge + SQS + OrderProcessor
#   4. ApiStack         — API Gateway + Lambda functions
#   5. MonitoringStack  — CloudWatch Dashboard + Alarms
#   6. SecurityStack    — WAF WebACL (us-east-1)
#   7. CicdStack        — self-update pipeline
#   8. InfrastructureStack — orchestration placeholder
#
# Environment variables injected by CicdStack:
#   CDK_DEFAULT_ACCOUNT — AWS account ID
#   CDK_DEFAULT_REGION  — deployment region (ap-southeast-1)

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - echo "=== Installing infrastructure dependencies ==="
      - cd infrastructure && npm ci
      - echo "=== Verifying esbuild (required for Lambda bundling) ==="
      - cd infrastructure && npx esbuild --version

  pre_build:
    commands:
      - echo "=== CDK synth verification ==="
      - cd infrastructure && npx cdk synth --quiet

  build:
    commands:
      - echo "=== Deploying backend stacks in dependency order ==="

      - echo "--- 1/8 AuthStack ---"
      - cd infrastructure && npx cdk deploy AuthStack --require-approval never --ci

      - echo "--- 2/8 DatabaseStack ---"
      - cd infrastructure && npx cdk deploy DatabaseStack --require-approval never --ci

      - echo "--- 3/8 EventStack ---"
      - cd infrastructure && npx cdk deploy EventStack --require-approval never --ci

      - echo "--- 4/8 ApiStack ---"
      - cd infrastructure && npx cdk deploy ApiStack --require-approval never --ci

      - echo "--- 5/8 MonitoringStack ---"
      - cd infrastructure && npx cdk deploy MonitoringStack --require-approval never --ci

      - echo "--- 6/8 SecurityStack (deploys to us-east-1) ---"
      - cd infrastructure && npx cdk deploy SecurityStack --require-approval never --ci

      - echo "--- 7/8 CicdStack (self-update) ---"
      - cd infrastructure && npx cdk deploy CicdStack --require-approval never --ci

      - echo "--- 8/8 InfrastructureStack ---"
      - cd infrastructure && npx cdk deploy InfrastructureStack --require-approval never --ci

      - echo "=== Backend stacks deployed successfully ==="

  post_build:
    commands:
      - echo "=== Backend deploy complete — $(date) ==="

artifacts:
  files:
    - infrastructure/cdk.out/**/*
  base-directory: .
  name: BackendArtifacts

cache:
  paths:
    - infrastructure/node_modules/**/*
