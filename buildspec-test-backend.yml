version: 0.2

# buildspec-test-backend.yml — Phase 9 CI/CD
#
# Validation-only stage — runs BEFORE deployment and BEFORE manual approval.
# Fails the pipeline fast if TypeScript, tests, or CDK synth are broken.
# Nothing is deployed in this buildspec.
#
# Environment variables injected by CicdStack:
#   CDK_DEFAULT_ACCOUNT — AWS account ID
#   CDK_DEFAULT_REGION  — deployment region

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - echo "=== Installing infrastructure dependencies ==="
      - cd infrastructure && npm ci

  pre_build:
    commands:
      - echo "=== TypeScript validation ==="
      - cd infrastructure && npx tsc --noEmit --skipLibCheck

  build:
    commands:
      - echo "=== Running infrastructure tests ==="
      - cd infrastructure && npm run test

      - echo "=== CDK synth — verify all stacks compile ==="
      - cd infrastructure && npx cdk synth --quiet

      - echo "=== Backend validation complete — no errors ==="

  post_build:
    commands:
      - echo "=== Backend test stage complete — $(date) ==="

reports:
  BackendTestReport:
    files:
      - infrastructure/test-results/**/*.xml
    file-format: JUNITXML
    # Non-fatal if no report file exists (tests may not emit JUnit XML)

cache:
  paths:
    - infrastructure/node_modules/**/*
