version: 0.2

# buildspec-test-frontend.yml — Phase 9 CI/CD
#
# Validation-only stage — runs BEFORE deployment and BEFORE manual approval.
# Runs TypeScript validation, unit tests, and a full Vite production build.
# Nothing is uploaded to S3 in this buildspec.
#
# Environment variables injected by CicdStack: none required for test stage.

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - echo "=== Installing frontend dependencies ==="
      - cd frontend && npm ci

  pre_build:
    commands:
      - echo "=== TypeScript validation ==="
      - cd frontend && npx tsc --noEmit

  build:
    commands:
      - echo "=== Running frontend unit tests ==="
      # vitest run exits 0 when all tests pass; exits non-zero on failure.
      - cd frontend && npm run test

      - echo "=== Production build validation ==="
      # Build to confirm no runtime import errors or tree-shaking failures.
      # The dist/ output is NOT uploaded here — FrontendDeploy stage handles that.
      - cd frontend && npm run build

      - echo "=== Build output summary ==="
      - ls -lh frontend/dist/
      - ls -lh frontend/dist/assets/ 2>/dev/null || true

      - echo "=== Frontend validation complete — no errors ==="

  post_build:
    commands:
      - echo "=== Frontend test stage complete — $(date) ==="

reports:
  FrontendTestReport:
    files:
      - frontend/test-results/**/*.xml
    file-format: JUNITXML
    # Non-fatal if no report file exists

cache:
  paths:
    - frontend/node_modules/**/*
